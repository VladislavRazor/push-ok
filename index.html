<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой пользователь</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 30px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            transition: 0.3s;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e293b;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e2e8f0;
            margin: 0 auto 20px;
            background-size: cover;
            background-position: center;
            border: 3px solid #3b82f6;
        }
        .info {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
            font-size: 15px;
            line-height: 1.8;
            color: #0f172a;
            display: none; /* скрыто до нажатия */
        }
        .info.visible {
            display: block;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e9edf2;
            padding: 6px 0;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: 500;
            color: #64748b;
        }
        .value {
            font-weight: 600;
            color: #0f172a;
            word-break: break-all;
        }
        .btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .btn:active {
            transform: scale(0.96);
            background: #2563eb;
        }
        .btn:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 16px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👤 Профиль</h1>
        <div class="avatar" id="avatar"></div>
        <button class="btn" id="showBtn">Показать мои данные</button>
        <div class="info" id="infoBlock">
            <div class="info-item"><span class="label">ID</span><span class="value" id="userId">—</span></div>
            <div class="info-item"><span class="label">Имя</span><span class="value" id="userName">—</span></div>
            <div class="info-item"><span class="label">Фамилия</span><span class="value" id="userLastName">—</span></div>
            <div class="info-item"><span class="label">Язык</span><span class="value" id="userLang">—</span></div>
            <div class="info-item"><span class="label">Username</span><span class="value" id="userUsername">—</span></div>
        </div>
        <div class="footer">Приложение запущено в MAX</div>
    </div>

    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <script>
        (function() {
            const btn = document.getElementById('showBtn');
            const infoBlock = document.getElementById('infoBlock');
            const avatarEl = document.getElementById('avatar');

            // Функция заполнения данных
            function displayUserData(user) {
                document.getElementById('userId').textContent = user.id || 'неизвестно';
                document.getElementById('userName').textContent = user.first_name || '—';
                document.getElementById('userLastName').textContent = user.last_name || '—';
                document.getElementById('userLang').textContent = user.language_code || '—';
                document.getElementById('userUsername').textContent = user.username || '—';

                // Установка аватара, если есть
                if (user.photo_url) {
                    avatarEl.style.backgroundImage = `url(${user.photo_url})`;
                } else {
                    avatarEl.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23e2e8f0"/><text x="50" y="58" font-size="40" text-anchor="middle" fill="%2364748b" font-family="sans-serif">👤</text></svg>')`;
                }

                // Показываем блок с информацией
                infoBlock.classList.add('visible');
            }

            // Обработчик нажатия на кнопку
            btn.addEventListener('click', function() {
                // Проверяем, доступен ли WebApp
                if (typeof window.WebApp !== 'undefined' && window.WebApp.initDataUnsafe) {
                    const user = window.WebApp.initDataUnsafe.user;
                    if (user) {
                        displayUserData(user);
                        btn.textContent = '✅ Данные загружены';
                        btn.disabled = true;
                    } else {
                        alert('Не удалось получить данные пользователя.');
                    }
                } else {
                    // Если запущено не в MAX — покажем демо-данные для теста
                    const demoUser = {
                        id: 123456789,
                        first_name: 'Тест',
                        last_name: 'Пользователь',
                        language_code: 'ru',
                        username: 'test_user'
                    };
                    displayUserData(demoUser);
                    btn.textContent = '⚠️ Демо-режим (запустите в MAX)';
                    btn.disabled = true;
                }
            });

            // Если данные уже доступны сразу (можно и без кнопки, но мы сделали по кнопке)
            // Дополнительно: можно проверить и показать кнопку, но оставим как есть.
        })();
    </script>
</body>
</html>
