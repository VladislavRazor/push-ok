<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Англо-русский тренажёр</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .sub {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .word-display {
            font-size: 42px;
            font-weight: 700;
            color: #0f172a;
            padding: 20px 0;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            font-size: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 10px 0 16px;
        }
        .btn {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.15s;
            flex: 1;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .result {
            min-height: 30px;
            font-size: 18px;
            font-weight: 500;
            margin: 12px 0 8px;
        }
        .stats {
            color: #475569;
            font-size: 15px;
            margin-top: 10px;
        }
        .progress {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #3b82f6;
            width: 0%;
            transition: width 0.3s;
        }
        .footer {
            margin-top: 18px;
            font-size: 13px;
            color: #94a3b8;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>📘 Словотренажёр</h1>
        <div class="sub">Английский → Русский</div>

        <div class="word-display" id="wordDisplay">загрузка...</div>

        <div class="input-area">
            <input type="text" id="answerInput" placeholder="Введите перевод..." autofocus>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="checkBtn">✅ Проверить</button>
            <button class="btn btn-secondary" id="skipBtn">⏭ Пропустить</button>
        </div>

        <div class="result" id="resultMessage"></div>
        <div class="stats" id="statsText">Слово 0 из 0</div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <div class="footer">
            <span id="dictionaryInfo">Встроенный словарь (20 слов)</span>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. ВСТРОЕННЫЙ СЛОВАРЬ (демо – 20 частотных слов)
        //    Чтобы использовать 1000 слов – замените массив ниже
        // ============================================================
        const fallbackWords = [
            ["the", "определённый артикль"],
            ["be", "быть"],
            ["to", "к, в, на"],
            ["of", "из, о"],
            ["and", "и"],
            ["a", "неопределённый артикль"],
            ["in", "в"],
            ["that", "тот, что"],
            ["have", "иметь"],
            ["I", "я"],
            ["it", "он, она, оно (неодуш.)"],
            ["for", "для"],
            ["not", "не"],
            ["on", "на"],
            ["with", "с"],
            ["he", "он"],
            ["as", "как, в качестве"],
            ["you", "ты, вы"],
            ["do", "делать"],
            ["at", "в, у, на"]
        ];

        // ============================================================
        // 2. ЗАГРУЗКА СЛОВАРЯ (сначала пытаемся загрузить внешний JSON,
        //    если не удаётся – используем fallback)
        // ============================================================
        let dictionary = [];               // основной массив [en, ru]
        let currentIndex = 0;
        let correctCount = 0;
        let totalWords = 0;
        let isFinished = false;

        const wordDisplay = document.getElementById('wordDisplay');
        const answerInput = document.getElementById('answerInput');
        const checkBtn = document.getElementById('checkBtn');
        const skipBtn = document.getElementById('skipBtn');
        const resultMessage = document.getElementById('resultMessage');
        const statsText = document.getElementById('statsText');
        const progressBar = document.getElementById('progressBar');
        const dictInfo = document.getElementById('dictionaryInfo');

        // --- Загрузка словаря ---
        async function loadDictionary() {
            // Пытаемся загрузить внешний JSON (если есть)
            const externalUrl = 'dictionary.json'; // можно заменить на свой URL
            try {
                const response = await fetch(externalUrl);
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data) && data.length > 0) {
                        dictionary = data;
                        dictInfo.textContent = `📂 Загружено ${dictionary.length} слов (внешний словарь)`;
                        return;
                    }
                }
            } catch (_) { /* игнорируем ошибки */ }

            // Если внешний не загрузился – берём встроенный
            dictionary = fallbackWords.slice();
            dictInfo.textContent = `📖 Встроенный словарь (${dictionary.length} слов)`;
        }

        // --- Инициализация ---
        function initGame() {
            // Перемешиваем слова
            for (let i = dictionary.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dictionary[i], dictionary[j]] = [dictionary[j], dictionary[i]];
            }
            totalWords = dictionary.length;
            currentIndex = 0;
            correctCount = 0;
            isFinished = false;
            resultMessage.textContent = '';
            resultMessage.style.color = '';
            answerInput.disabled = false;
            checkBtn.disabled = false;
            skipBtn.disabled = false;
            showWord();
        }

        function showWord() {
            if (currentIndex >= totalWords) {
                wordDisplay.textContent = '🎉 ВСЕ СЛОВА ПРОЙДЕНЫ!';
                answerInput.disabled = true;
                checkBtn.disabled = true;
                skipBtn.disabled = true;
                resultMessage.textContent = `✅ Правильных ответов: ${correctCount} из ${totalWords}`;
                resultMessage.style.color = '#16a34a';
                statsText.textContent = '';
                progressBar.style.width = '100%';
                isFinished = true;
                return;
            }

            const [en, ru] = dictionary[currentIndex];
            wordDisplay.textContent = en;
            answerInput.value = '';
            answerInput.focus();
            resultMessage.textContent = '';
            statsText.textContent = `Слово ${currentIndex+1} из ${totalWords}`;
            progressBar.style.width = `${((currentIndex) / totalWords) * 100}%`;
        }

        function checkAnswer() {
            if (isFinished || currentIndex >= totalWords) return;
            const userAnswer = answerInput.value.trim().toLowerCase();
            const correctAnswer = dictionary[currentIndex][1].toLowerCase();

            if (userAnswer === correctAnswer) {
                correctCount++;
                resultMessage.textContent = '✅ Правильно!';
                resultMessage.style.color = '#22c55e';
            } else {
                resultMessage.textContent = `❌ Неправильно. Правильно: ${dictionary[currentIndex][1]}`;
                resultMessage.style.color = '#ef4444';
            }
            // Автоматический переход через 1.2 сек
            setTimeout(() => {
                currentIndex++;
                showWord();
            }, 1200);
        }

        function skipWord() {
            if (isFinished || currentIndex >= totalWords) return;
            resultMessage.textContent = `⏭ Пропущено. Правильно: ${dictionary[currentIndex][1]}`;
            resultMessage.style.color = '#f59e0b';
            setTimeout(() => {
                currentIndex++;
                showWord();
            }, 1000);
        }

        // --- События ---
        checkBtn.addEventListener('click', checkAnswer);
        skipBtn.addEventListener('click', skipWord);
        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        // --- Старт ---
        (async function start() {
            await loadDictionary();
            initGame();
        })();
    </script>
</body>
</html>
